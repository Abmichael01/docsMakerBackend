# Append-include for postgresql.conf
#
# Apply by appending to /etc/postgresql/<ver>/main/postgresql.conf, then:
#   sudo systemctl restart postgresql   (full restart needed for max_connections + shared_preload_libraries)
#
# SKIP THIS FILE if your Postgres is a managed Dokploy service or external
# managed DB — you don't have postgresql.conf access there.
#
# Assumes ~8GB RAM, ~4 vCPU Contabo VPS.

# --- Connections ----------------------------------------------------------
# We now front PG with PgBouncer, so the real backend count is bounded by
# (default_pool_size + reserve_pool_size) per DB-user pair. Drop from 100.
max_connections = 60

# --- Memory ---------------------------------------------------------------
# shared_buffers ~= 25% of RAM. 2GB on 8GB box.
shared_buffers = 2GB

# work_mem: per-sort/per-hash, not per-connection. With 60 conns and a few
# hash joins per query, 16MB × ~3 active * 60 = 2.9GB worst case. Safe.
work_mem = 16MB

# maintenance_work_mem: used by VACUUM, CREATE INDEX. One at a time.
maintenance_work_mem = 256MB

# effective_cache_size: PG's hint about OS cache. ~50-75% of RAM.
effective_cache_size = 5GB

# --- Write-ahead log / checkpoint ----------------------------------------
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
min_wal_size = 1GB
max_wal_size = 4GB

# --- Query stats ----------------------------------------------------------
# Required for ops/pg_stat_statements.sql to work. After uncommenting, do a
# FULL restart (systemctl restart postgresql) — reload is not enough.
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = top

# --- Slow query log -------------------------------------------------------
# Anything over 500ms ends up in the Postgres log. Tune lower if needed.
log_min_duration_statement = 500
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 1000

# --- Autovacuum -----------------------------------------------------------
# Default is usually fine. Bump scale factors down if VisitorLog grows huge.
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
